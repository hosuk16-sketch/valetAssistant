<!DOCTYPE html>
<html lang="ko">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Valet Assistant</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">


<h1>🚗 Valet Assistant</h1>


<label>차량번호</label>

<input
id="carNumber"
placeholder="123가 4567">


<input
type="file"
id="cameraInput"
accept="image/*"
capture="environment"
style="display:none;">


<button 
class="camera"
id="cameraButton">
📷 번호판 촬영
</button>


<img
id="previewImage"
style="
width:100%;
margin-top:20px;
border-radius:15px;
display:none;">


<h3>층 선택</h3>

<div class="floorButtons">

<button>없음</button>
<button>지하1층</button>
<button>지하2층</button>
<button>2층</button>

</div>



<h3>구역 선택</h3>


<div class="areaButtons">

<button>a</button>
<button>b</button>
<button>c</button>
<button>d</button>
<button>e</button>
<button>rac</button>
<button>외곽1</button>
<button>외곽2</button>

</div>



<button class="copy">

📋 클립보드 복사

</button>


<p id="result"></p>


</div>


<script src="ocr.js"></script>
<script src="app.js"></script>
</html>
